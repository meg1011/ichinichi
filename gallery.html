function Nav() {

  }, []);

        { href: 'index.html', label: 'TOP' },
    { href: 'index.html#menu', label: '撮影メニュー' },
    { href: 'gallery.html', label: 'ギャラリー', active: true },
    { href: 'pricing.html', label: '料金' },
    { href: 'index.html#faq', label: 'FAQ' },
  ];
  return (
    <header style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000, background: '#F2EDE6', borderBottom: '1px solid var(--border)', backdropFilter: 'blur(8px)' }}>

          <a href="contact.html" className="btn btn--primary" style={{ padding: '10px 20px', fontSize: 11 }}>ご予約・お問い合わせ</a>

          {[0,1,2].map(i => <span key={i} style={{ display: 'block', width: 22, height: 1, background: 'var(--text)', transition: 'all 0.3s', transform: open && i===0 ? 'rotate(45deg) translate(4px,4px)' : open && i===2 ? 'rotate(-45deg) translate(4px,-4px)' : 'none', opacity: open && i===1 ? 0 : 1 }}/>)}

  );

          <p style={{ fontSize: 15, color: 'var(--text-mid)', maxWidth: 480, margin: '0 auto', lineHeight: 1.9 }}>
            ジャンルごとに作例をご覧いただけます。<br/>実際の撮影の雰囲気の参考にしてください。
          </p>
        </div>

        {/* Tab / Jump nav */}
        <div style={{ position: 'sticky', top: 88, zIndex: 100, background: 'var(--bg-cream)', borderBottom: '1px solid var(--border)', padding: '14px 0' }}>
          <div className="container" style={{ overflowX: 'auto' }}>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center', flexWrap: 'wrap' }}>
              {genres.map(g => (
                <a key={g.id} href={`#${g.id}`}
                  style={{
                    padding: '8px 18px', fontSize: 12, letterSpacing: '0.06em',
                    color: 'var(--text)', border: '1px solid var(--border)',
                    borderRadius: 20, background: 'var(--bg)',
                    transition: 'all 0.2s', whiteSpace: 'nowrap', cursor: 'pointer',
                    textDecoration: 'none', display: 'inline-block',
                  }}
                  onMouseEnter={e => {
                    e.currentTarget.style.background = 'var(--accent)';
                    e.currentTarget.style.borderColor = 'var(--accent)';
                    e.currentTarget.style.color = '#fff';
                  }}
                  onMouseLeave={e => {
                    e.currentTarget.style.background = 'var(--bg)';
                    e.currentTarget.style.borderColor = 'var(--border)';
                    e.currentTarget.style.color = 'var(--text)';
                  }}
                >
                  {g.label}
                </a>
              ))}
            </div>
          </div>
        </div>

        {/* Sections */}
        {genres.map((g, i) => <GenreSection key={g.id} genre={g} index={i} />)}

        {/* CTA */}
        <section style={{ padding: '72px 0', background: 'var(--bg-cream)', textAlign: 'center' }}>
          <div className="container">
            <p style={{ fontFamily: 'var(--serif)', fontSize: 'clamp(18px, 3vw, 26px)', marginBottom: 12, fontWeight: 400 }}>
              撮影のご相談、お気軽にどうぞ
            </p>
            <p style={{ fontSize: 15, color: 'var(--text-mid)', marginBottom: 32, lineHeight: 2 }}>
              どんな写真を残したいか、まずはお気軽にお問い合わせください。
            </p>
            <div style={{ display: 'flex', gap: 12, justifyContent: 'center', flexWrap: 'wrap' }}>
              <a href="https://lin.ee/pSxLqqB" target="_blank" rel="noopener" className="btn btn--primary" style={{ background: '#06C755', borderColor: '#06C755' }}>LINEでご相談・ご予約</a>
              <a href="pricing.html" className="btn">料金を確認する</a>
            </div>
          </div>
        </section>
      </div>

      {/* Footer */}
      <footer style={{ background: 'var(--text)', color: 'rgba(255,255,255,0.7)', padding: '40px 0 28px' }}>
        <div className="container" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 16 }}>
          <a href="index.html" style={{ display: 'flex', alignItems: 'center' }}>
            <img src="images/logo.png" alt="いち日写真館" style={{ height: 28, width: 'auto', filter: 'invert(1)', opacity: 0.85 }} />
          </a>
          <p style={{ fontSize: 11 }}>© 2026 いち日写真館. All rights reserved.</p>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
