<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accent":"#C07B5E","bg":"#FAFAF7"}/*EDITMODE-END*/;
function applyTweak(){
  const accent=document.getElementById('tw-accent')?.value||TWEAK_DEFAULTS.accent;
  const bg=document.getElementById('tw-bg')?.value||TWEAK_DEFAULTS.bg;
  document.documentElement.style.setProperty('--accent',accent);
  document.documentElement.style.setProperty('--bg',bg);
  window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accent,bg}},'*');
}
window.addEventListener('message',e=>{
  if(e.data?.type==='__activate_edit_mode')document.getElementById('tweaks-panel').classList.add('active');
  if(e.data?.type==='__deactivate_edit_mode')document.getElementById('tweaks-panel').classList.remove('active');
});
window.parent.postMessage({type:'__edit_mode_available'},'*');
</script>
