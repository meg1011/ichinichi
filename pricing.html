<script type="text/babel">

    <header style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000, background: '#F2EDE6', borderBottom: '1px solid var(--border)', backdropFilter: 'blur(8px)' }}>

      </div>

  { label: 'アルバム制作（送料込み）', value: 'アルバム代＋8,000円〜' },
];

const genres = [

    id: 'family',

    plans: [

      { name: '平日撮影', time: '50〜60分', photos: '85カット以上', price: '¥36,300', note: '全カットレタッチ込み' },
      { name: '土日祝撮影', time: '50〜60分', photos: '85カット以上', price: '¥41,300', note: '全カットレタッチ込み' },
    ],
    note: '七五三は9〜11月が繁忙期です。お早めにご予約ください。',
  },
  {
    id: 'maternity',
    label: 'マタニティ',
    en: 'Maternity',
    desc: '妊娠7〜9ヶ月頃が撮影に最適な時期です。ご自宅や自然の中で、しなやかで美しい時間を残します。',

      { name: '土日祝撮影', time: '50〜60分', photos: '85カット以上', price: '¥41,300', note: '全カットレタッチ込み' },
    ],
    note: '出産予定日の1〜2ヶ月前のご予約をおすすめします。',
  },
  {
    id: 'coming-of-age',
    label: 'ハーフ成人式・成人式',
    en: 'Coming of Age',
    desc: '10歳・20歳の晴れやかな節目を、着物や衣装とともに。凛とした姿と自然な笑顔の両方を残します。',

    extra: [{ label: 'リピーター割引', value: '－3,000円' }],

function PlanCard({ plan }) {
  return (
    <div style={{
      border: '1px solid var(--border)',
      background: 'var(--bg-white)',
      padding: '32px 24px',
      position: 'relative',
      flex: 1,
      minWidth: 180,
    }}>
      
      <p style={{ fontSize: 10, color: 'var(--accent)', letterSpacing: '0.12em', marginBottom: 4 }}>{plan.name}</p>
      <p style={{ fontFamily: 'var(--serif)', fontSize: plan.price === 'ご相談' ? 22 : 28, fontWeight: 400, marginBottom: 4, marginTop: 8 }}>{plan.price}</p>
      <p style={{ fontSize: 10, color: 'var(--text-mid)', marginBottom: 20 }}>税込 / 出張費別</p>
      <div style={{ borderTop: '1px solid var(--border)', paddingTop: 16, display: 'flex', flexDirection: 'column', gap: 7 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12 }}>
          <span style={{ color: 'var(--text-mid)' }}>撮影時間</span><span>{plan.time}</span>

        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12 }}>
          <span style={{ color: 'var(--text-mid)' }}>お届け枚数</span><span>{plan.photos}</span>

    </div>
  );
}

      <div className="container">
        <div style={{ display: 'grid', gridTemplateColumns: '220px 1fr', gap: 56, alignItems: 'start' }} className="pricing-row">
          {/* Left label */}
          <div>
            <p style={{ fontSize: 10, letterSpacing: '0.18em', color: 'var(--accent)', marginBottom: 6 }}>{genre.en}</p>

            <div style={{ width: 24, height: 1, background: 'var(--accent)', marginBottom: 14 }}/>

              <div style={{ marginTop: 20, padding: '12px 14px', background: 'var(--accent-light)', fontSize: 11, color: 'var(--text)', lineHeight: 1.8 }}>

                <div key={o.label} style={{ display: 'flex', padding: '12px 20px', borderBottom: '1px solid var(--border)', gap: 24, fontSize: 13, fontFamily: 'var(--sans)' }}>

                  <span style={{ fontFamily: 'var(--serif)', letterSpacing: '0.04em' }}>{o.value}</span>

                    e.currentTarget.style.color = '#fff';
                  }}
                  onMouseLeave={e => {
                    e.currentTarget.style.background = 'var(--bg)';
                    e.currentTarget.style.borderColor = 'var(--border)';
                    e.currentTarget.style.color = 'var(--text)';
                  }}

          <div className="container" style={{ maxWidth: 700 }}>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 20, fontWeight: 400, marginBottom: 28 }}>料金に関するご注意</h2>
            {[
              ['料金', '表示はすべて税込です。'],
              ['出張料', 'JR東小金井駅を基点に距離に応じて変わります。電車・バス・徒歩で片道20分以内は無料、20〜40分は1,000円、40〜60分は2,000円、60分以上は延長20分ごとに＋1,000円。'],
              ['データ納品', 'オンライン（ダウンロード形式）で2週間以内にお届けします。ダウンロード期限は納品時にご案内します。'],
              ['データ保管', 'いち日写真館でのデータ保存期間は3ヶ月です。必ずご自宅で複数のバックアップをお取りください。'],
              ['キャンセル', 'やむを得ない悪天候・体調不良の場合は延期可能です（当日でも可）。延期なしのキャンセルは：20〜7日前10% / 7〜4日前20% / 3〜2日前50% / 前日80% / 当日100%のキャンセル料が発生します。'],

            ].map(([label, val]) => (
              <div key={label} style={{ display: 'flex', gap: 24, padding: '14px 0', borderBottom: '1px solid var(--border)', fontSize: 15 }}>
                <span style={{ color: 'var(--text-mid)', flexShrink: 0, width: 90 }}>{label}</span>
                <span>{val}</span>
              </div>

        <section style={{ padding: '40px 0', background: 'var(--bg-white)', textAlign: 'center' }}>

          <a href="index.html" style={{ display: 'flex', alignItems: 'center' }}>
            <img src="images/logo.png" alt="いち日写真館" style={{ height: 28, width: 'auto', filter: 'invert(1)', opacity: 0.85 }} />

        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
